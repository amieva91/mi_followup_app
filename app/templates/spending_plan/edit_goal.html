{% extends "base/layout.html" %}
{% block title %}Editar objetivo{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-4 py-8">
    <div class="mb-6">
        <a href="{{ url_for('spending_plan.index') }}" class="text-sm text-indigo-600 hover:underline">← Volver a planificación</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">Editar objetivo genérico</h1>
        <p class="text-sm text-gray-500 mt-1">Los cambios se validan con el planificador de 5 años y se replanifica automáticamente.</p>
    </div>

    <form method="post" action="{{ url_for('spending_plan.edit_goal', goal_id=goal.id) }}" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input type="text" name="title" required maxlength="200" value="{{ goal.title }}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Importe total (€)</label>
            <input type="number" name="amount_total" required min="0.01" step="0.01" value="{{ "%.2f"|format(goal.amount_total) }}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad (1–5)</label>
            <input type="number" name="priority" min="1" max="5" value="{{ goal.priority }}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha límite deseada <span class="text-gray-500 font-normal">(opcional)</span></label>
            <input type="date" name="target_date" value="{{ goal.target_date.isoformat() if goal.target_date else '' }}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Forma de pago <span class="text-gray-500 font-normal">(opcional)</span></label>
            <select name="pay_mode" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900">
                <option value="" {% if pay_mode == 'auto' %}selected{% endif %}>Automático (el sistema elige)</option>
                <option value="installments" {% if pay_mode == 'installments' %}selected{% endif %}>Cuotas</option>
                <option value="lump" {% if pay_mode == 'lump' %}selected{% endif %}>Pago único</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 cursor-help" title="Si eliges «Cuotas» y un número, se respeta; si lo dejas vacío, el planificador reparte en el mínimo de meses posible.">N.º cuotas <span class="text-gray-500 font-normal">(opc.)</span></label>
            <input type="number" name="installment_months" min="1" max="60" placeholder="—"
                   value="{{ installment_months if installment_months is not none else '' }}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900"/>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium">
                Guardar y replanificar
            </button>
            <a href="{{ url_for('spending_plan.index') }}" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
