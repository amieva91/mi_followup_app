{# Modal crear categoría de ingreso. Usa div en lugar de form para evitar formularios anidados. #}
<style>
    .modal-touch-btn {
        transition: transform 0.12s ease, filter 0.12s ease, background-color 0.12s ease;
    }
    .modal-touch-btn:active {
        transform: scale(0.97);
        filter: brightness(0.96);
    }
</style>
<div x-data="categoryModalIncome('{{ url_for('incomes.quick_create_category') }}', '{{ category_select_id }}')" x-cloak>
    <button type="button" @click="open()" class="modal-touch-btn ml-2 px-3 py-2 text-sm rounded-xl bg-slate-700 hover:bg-slate-800 text-white transition" title="Crear categoría rápida">+</button>
    <div x-show="show" x-transition class="fixed inset-0 z-50 flex items-center justify-center bg-black/55 p-4" style="display: none;">
        <div class="w-full max-w-sm rounded-2xl border border-slate-200 bg-gradient-to-br from-[#f8fbfc] to-[#f1f7f8] p-6 shadow-[0_20px_45px_rgba(15,23,42,0.28)]" @click.away="close()">
            <h3 class="text-lg font-bold mb-4 text-gray-900">Nueva categoría de ingreso</h3>
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                <input type="text" x-model="name" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="Ej: Freelance" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Icono</label>
                <input type="text" x-model="icon" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="💵">
            </div>
            <div class="flex gap-2">
                <button type="button" @click="submit()" class="modal-touch-btn flex-1 rounded-full bg-teal-600 hover:bg-teal-700 text-white px-4 py-2.5 transition">Crear</button>
                <button type="button" @click="close()" class="modal-touch-btn px-4 py-2.5 rounded-full bg-slate-700 hover:bg-slate-800 text-white transition">Cancelar</button>
            </div>
            <p x-show="error" x-text="error" class="mt-2 text-red-600 text-sm"></p>
        </div>
    </div>
</div>
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('categoryModalIncome', (apiUrl, selectId) => ({
        show: false,
        name: '',
        icon: '💵',
        error: '',
        apiUrl,
        selectId,
        open() {
            this.show = true;
            this.error = '';
        },
        close() {
            this.show = false;
        },
        async submit() {
            this.error = '';
            const form = document.getElementById(this.selectId)?.closest('form');
            const formData = new FormData();
            formData.append('csrf_token', form?.querySelector('input[name="csrf_token"]')?.value || '');
            formData.append('name', this.name);
            formData.append('icon', this.icon || '💵');
            try {
                const r = await fetch(this.apiUrl, { method: 'POST', body: formData });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || 'Error al crear');
                const sel = document.getElementById(this.selectId);
                if (sel) {
                    const opt = document.createElement('option');
                    opt.value = data.id;
                    opt.textContent = data.label;
                    opt.selected = true;
                    sel.appendChild(opt);
                }
                this.close();
                this.name = '';
                this.icon = '💵';
            } catch (e) {
                this.error = e.message;
            }
        }
    }));
});
</script>
