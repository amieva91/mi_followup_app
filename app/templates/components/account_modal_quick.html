{# Modal crear cuenta de broker. Mismo patrón que category_modal_expense. Requiere: account_select_id, brokers_for_account_modal. #}
{% if brokers_for_account_modal is not defined %}{% set brokers_for_account_modal = [] %}{% endif %}
<style>
    .account-modal-touch-btn { transition: transform 0.12s ease, filter 0.12s ease, background-color 0.12s ease; }
    .account-modal-touch-btn:active { transform: scale(0.97); filter: brightness(0.96); }
</style>
<div x-data="accountModalQuick('{{ url_for('portfolio.quick_create_account') }}', '{{ account_select_id }}')">
    <button type="button" @click="show = true; error = ''" class="account-modal-touch-btn shrink-0 inline-flex items-center justify-center min-w-[2.5rem] h-10 px-3 text-sm rounded-xl bg-slate-700 hover:bg-slate-800 text-white transition" title="Crear cuenta / broker">+</button>
    <div x-show="show" x-cloak x-transition class="fixed inset-0 z-50 flex items-center justify-center bg-black/55 p-4" style="display: none;">
        <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-gradient-to-br from-[#f8fbfc] to-[#f1f7f8] p-6 shadow-[0_20px_45px_rgba(15,23,42,0.28)] max-h-[min(90vh,720px)] overflow-y-auto" @click.away="show=false">
            <h3 class="text-lg font-bold mb-4 text-gray-900">Nueva cuenta / broker</h3>
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">Broker existente</label>
                <select x-model="brokerId" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    <option value="">— Selecciona o crea abajo —</option>
                    {% for b in brokers_for_account_modal %}
                    <option value="{{ b.id }}">{{ b.label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">O nombre de broker nuevo</label>
                <input type="text" x-model="brokerNameNew" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="Si no está en la lista, escribe aquí">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la cuenta</label>
                <input type="text" x-model="accountName" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" placeholder="Ej: Principal, DEG" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Divisa base</label>
                <select x-model="baseCurrency" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                    <option value="EUR">EUR - Euro</option>
                    <option value="USD">USD</option>
                    <option value="GBP">GBP</option>
                    <option value="CHF">CHF</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button type="button" @click="submitAccount()" class="account-modal-touch-btn flex-1 rounded-full bg-teal-600 hover:bg-teal-700 text-white px-4 py-2.5 transition">Crear</button>
                <button type="button" @click="show = false" class="account-modal-touch-btn px-4 py-2.5 rounded-full bg-slate-700 hover:bg-slate-800 text-white transition">Cancelar</button>
            </div>
            <p x-show="error" x-text="error" class="mt-2 text-red-600 text-sm"></p>
        </div>
    </div>
</div>
<script>
document.addEventListener('alpine:init', function() {
    Alpine.data('accountModalQuick', function(apiUrl, selectId) {
        return {
            show: false,
            brokerId: '',
            brokerNameNew: '',
            accountName: '',
            baseCurrency: 'EUR',
            error: '',
            apiUrl: apiUrl,
            selectId: selectId,
            submitAccount: function() {
                var self = this;
                this.error = '';
                if (!this.brokerId && !(this.brokerNameNew && this.brokerNameNew.trim())) {
                    this.error = 'Selecciona un broker o escribe el nombre de uno nuevo.';
                    return;
                }
                if (!this.accountName || !this.accountName.trim()) {
                    this.error = 'Indica el nombre de la cuenta.';
                    return;
                }
                var fd = new FormData();
                var form = document.getElementById(self.selectId) && document.getElementById(self.selectId).closest('form');
                fd.append('csrf_token', (form && form.querySelector('input[name=csrf_token]') && form.querySelector('input[name=csrf_token]').value) || '');
                if (this.brokerId) {
                    fd.append('broker_id', this.brokerId);
                } else {
                    fd.append('broker_name_new', this.brokerNameNew.trim());
                }
                fd.append('account_name', this.accountName.trim());
                fd.append('base_currency', this.baseCurrency);
                fetch(this.apiUrl, { method: 'POST', body: fd })
                    .then(function(r) { return r.json().then(function(d) { return { r: r, d: d }; }); })
                    .then(function(p) {
                        if (!p.r.ok) throw new Error((p.d && p.d.error) || p.r.statusText);
                        if (p.d && p.d.error) throw new Error(p.d.error);
                        return p.d;
                    })
                    .then(function(d) {
                        if (!d || !d.ok) throw new Error((d && d.error) || 'Error al crear la cuenta');
                        var s = document.getElementById(self.selectId);
                        if (s) {
                            var o = document.createElement('option');
                            o.value = d.id;
                            o.textContent = d.label;
                            o.selected = true;
                            s.appendChild(o);
                        }
                        self.show = false;
                        self.brokerId = '';
                        self.brokerNameNew = '';
                        self.accountName = '';
                        self.baseCurrency = 'EUR';
                    })
                    .catch(function(e) { self.error = e.message; });
            }
        };
    });
});
</script>
