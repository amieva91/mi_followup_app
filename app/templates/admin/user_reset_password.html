{% extends "base/layout.html" %}
{% block title %}Reset contraseña - {{ user.username }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
    <h1 class="text-xl font-bold text-gray-800 mb-4">Restablecer contraseña: {{ user.username }}</h1>
    <form method="post" action="{{ url_for('admin.user_reset_password_form', user_id=user.id) }}" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label for="new_password" class="block text-sm font-medium text-gray-700">Nueva contraseña (mín. 6 caracteres)</label>
            <input type="password" name="new_password" id="new_password" required minlength="6" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2">
        </div>
        <div class="flex gap-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Guardar</button>
            <a href="{{ url_for('admin.users_list') }}" class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
